name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build @tronvercel/ui
        run: npm run build

      - name: Build @tronvercel/auth
        run: npm run build
        working-directory: packages/auth

      - name: Publish @tronvercel/ui
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tronvercel/auth
        run: npm publish --access public
        working-directory: packages/auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
